# harper-base schema
#
# Two tables that give OpenClaw a shared place to:
#   1. Record every pipeline it builds (so you can audit + reuse).
#   2. Flag anything it can't do without a human (API keys, paid sources, etc).
#
# Both use plain `@table @export` per Harper's adding-tables-with-schemas rule.
# The GraphQL type name IS the underlying table name — do NOT use @table(table:)
# overrides, which cause tables.TypeName to be undefined in Resource methods
# (REST routing resolves the name correctly but the runtime tables global
#  keys by the underlying name only).

# --- Pipeline --------------------------------------------------------------
# One row per Harper component OpenClaw has deployed.
type Pipeline @table @export {
    id: ID @primaryKey
    sourceName: String @indexed
    sourceUrl: String
    targetTable: String @indexed
    scheduleCron: String
    businessObjective: String @indexed
    status: String @indexed
    createdAt: String @indexed
    updatedAt: String
    createdByAgent: String
    componentPackage: String
    lastRunAt: String
    lastRunStatus: String @indexed
    lastRunRecords: Int
    notes: String
}

# --- PendingHumanAction ----------------------------------------------------
# When OpenClaw finds a viable-looking source but can't proceed on its own,
# it writes a row here instead of guessing.
type PendingHumanAction @table @export {
    id: ID @primaryKey
    sourceName: String @indexed
    sourceUrl: String
    businessObjective: String @indexed
    blocker: String @indexed
    blockerDetail: String
    suggestedNextStep: String
    status: String @indexed
    createdAt: String @indexed
    resolvedAt: String
    resolvedBy: String
    createdByAgent: String
}
